<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entity Bank – Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { box-sizing: border-box; }
    body { background-color: #0F172A; color: #F1F5F9; font-family: 'Inter', system-ui, sans-serif; }
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0px 1000px #0F172A inset !important;
      -webkit-text-fill-color: #F1F5F9 !important;
      caret-color: #F1F5F9;
    }
    .btn-accent { background-color: #00C896; }
    .btn-accent:hover { background-color: #00b386; }
    .btn-accent:disabled { background-color: #00946e; cursor: not-allowed; opacity: 0.7; }
    .input-field {
      background-color: #0F172A;
      border: 1px solid #334155;
      color: #F1F5F9;
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
      font-size: 0.95rem;
    }
    .input-field::placeholder { color: #475569; }
    .input-field:focus { border-color: #00C896; }
    .input-field.error-border { border-color: #EF4444; }
    .accent { color: #00C896; }
    .card { background-color: #1E293B; }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen flex items-start justify-center pt-16 pb-10 px-4">

  <div class="card w-full max-w-sm rounded-2xl p-8 shadow-2xl mt-4">

    <!-- Logo -->
    <div class="mb-6 text-center">
      <span class="text-2xl font-bold accent tracking-tight">Entity Bank</span>
    </div>

    <!-- Heading -->
    <h1 class="text-xl font-semibold text-center mb-1" style="color:#F1F5F9;">Welcome back</h1>
    <p class="text-sm text-center mb-7" style="color:#94A3B8;">Enter your details to access your account</p>

    <!-- Form -->
    <form id="loginForm" novalidate>

      <!-- Account Number -->
      <div class="mb-4">
        <label class="block text-sm font-medium mb-1.5" style="color:#CBD5E1;" for="accountNumber">Account Number</label>
        <input
          id="accountNumber"
          class="input-field"
          type="text"
          placeholder="2010000001"
          maxlength="10"
          inputmode="numeric"
          autocomplete="username"
        />
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="block text-sm font-medium mb-1.5" style="color:#CBD5E1;" for="password">Password</label>
        <div class="relative">
          <input
            id="password"
            class="input-field pr-11"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <button
            type="button"
            id="eyeToggle"
            class="absolute right-3 top-1/2 -translate-y-1/2 focus:outline-none"
            style="color:#64748B;"
            aria-label="Toggle password visibility"
          >
            <i data-lucide="eye" class="w-5 h-5" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <!-- Forgot password -->
      <div class="flex justify-end mb-6">
        <a href="#" class="text-xs font-medium accent hover:underline">Forgot password?</a>
      </div>

      <!-- Error message -->
      <div id="errorMsg" class="hidden text-sm rounded-lg px-4 py-2.5 mb-4 flex items-center gap-2" style="background:#EF444415; color:#EF4444; border:1px solid #EF444440;">
        <i data-lucide="alert-circle" class="w-4 h-4 shrink-0"></i>
        <span id="errorText"></span>
      </div>

      <!-- Submit button -->
      <button
        id="loginBtn"
        type="submit"
        class="btn-accent w-full text-white font-semibold rounded-lg py-3 text-sm transition-colors duration-200"
      >
        Login
      </button>

    </form>

    <!-- Register link -->
    <p class="text-center text-sm mt-6" style="color:#94A3B8;">
      Don't have an account?
      <a href="register.html" class="accent font-medium hover:underline ml-1">Create one</a>
    </p>

  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }

    // Init Lucide icons
    lucide.createIcons();

    const form       = document.getElementById('loginForm');
    const accInput   = document.getElementById('accountNumber');
    const pwdInput   = document.getElementById('password');
    const loginBtn   = document.getElementById('loginBtn');
    const errorMsg   = document.getElementById('errorMsg');
    const errorText  = document.getElementById('errorText');
    const eyeToggle  = document.getElementById('eyeToggle');
    const eyeIcon    = document.getElementById('eyeIcon');

    let pwdVisible = false;

    // Eye toggle
    eyeToggle.addEventListener('click', () => {
      pwdVisible = !pwdVisible;
      pwdInput.type = pwdVisible ? 'text' : 'password';
      eyeIcon.setAttribute('data-lucide', pwdVisible ? 'eye-off' : 'eye');
      lucide.createIcons();
    });

    // Only allow digits in account number field
    accInput.addEventListener('input', () => {
      accInput.value = accInput.value.replace(/\D/g, '');
    });

    function showError(msg) {
      errorText.textContent = msg;
      errorMsg.classList.remove('hidden');
      accInput.classList.remove('error-border');
      pwdInput.classList.remove('error-border');
    }

    function hideError() {
      errorMsg.classList.add('hidden');
      accInput.classList.remove('error-border');
      pwdInput.classList.remove('error-border');
    }

    function setLoading(loading) {
      loginBtn.disabled = loading;
      loginBtn.innerHTML = loading
        ? '<span class="spinner"></span>Logging in...'
        : 'Login';
    }

    async function handleLogin() {
      hideError();

      const accountNumber = accInput.value.trim();
      const password      = pwdInput.value;

      // Client-side validation
      if (!accountNumber && !password) {
        showError('Please fill in all fields.');
        accInput.classList.add('error-border');
        pwdInput.classList.add('error-border');
        return;
      }
      if (!accountNumber) {
        showError('Account number is required.');
        accInput.classList.add('error-border');
        accInput.focus();
        return;
      }
      if (!/^\d{10}$/.test(accountNumber)) {
        showError('Account number must be exactly 10 digits.');
        accInput.classList.add('error-border');
        accInput.focus();
        return;
      }
      if (!password) {
        showError('Password is required.');
        pwdInput.classList.add('error-border');
        pwdInput.focus();
        return;
      }

      setLoading(true);

      try {
        const response = await axios.post('http://localhost:3060/api/v1/auth/login', {
          accountNumber,
          password,
        });

        localStorage.setItem('accountNumber', JSON.stringify(accountNumber))

        const token = response.data.token;
        localStorage.setItem('token', token);

        //fixed bug
        // const profile = await axios.get("http://localhost:3060/api/user/profile", {
        //   headers: { Authorization: `Bearer ${token}` }
        // })
        window.location.href = 'dashboard.html';

      } catch (err) {
        setLoading(false);
        const status = err.response?.status;
        if (status === 404) {
          showError('Account not found. Check your account number.');
          accInput.classList.add('error-border');
        } else if (status === 401) {
          showError('Incorrect password. Please try again.');
          pwdInput.classList.add('error-border');
          pwdInput.focus();
        } else if (status === 400) {
          showError('Fill all fields before submitting.');
        } else {
          showError('Something went wrong. Please try again later.');
        }
        // Re-init lucide for the alert icon
        lucide.createIcons();
      }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      handleLogin();
    });

    // Enter key support (works even outside the form)
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
