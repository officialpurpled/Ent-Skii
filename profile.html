<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entity Bank – Me</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0F172A;
      --card: #1E293B;
      --accent: #00C896;
      --accent-dim: rgba(0,200,150,0.12);
      --text: #F1F5F9;
      --muted: #94A3B8;
      --border: #334155;
      --danger: #EF4444;
      --danger-dim: rgba(239,68,68,0.12);
      --avatar-bg: #0D5C63;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 480px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
      padding-bottom: 90px;
    }

    /* Subtle background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,200,150,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 24px 12px;
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(12px);
      background: rgba(15,23,42,0.85);
      border-bottom: 1px solid rgba(51,65,85,0.4);
    }

    .header h1 {
      font-size: 1.125rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    /* ── SCROLL AREA ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      scrollbar-width: none;
    }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border-radius: 20px;
      border: 1px solid rgba(51,65,85,0.6);
      overflow: hidden;
    }

    /* ── PROFILE CARD ── */
    .profile-card {
      padding: 32px 24px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      position: relative;
    }

    .profile-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(180deg, rgba(0,200,150,0.07) 0%, transparent 100%);
    }

    .avatar {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: var(--avatar-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
      border: 3px solid rgba(0,200,150,0.3);
      box-shadow: 0 0 0 6px rgba(0,200,150,0.07);
      position: relative;
      z-index: 1;
      transition: transform 0.2s ease;
    }
    .avatar:hover { transform: scale(1.04); }

    .profile-name {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      margin-top: 2px;
    }

    .account-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .account-number {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .copy-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;
    }
    .copy-btn:hover {
      color: var(--accent);
      background: var(--accent-dim);
    }
    .copy-btn:active { transform: scale(0.9); }

    /* ── DETAIL / ACTION ROWS ── */
    .list-card { margin-top: 12px; }

    .list-row {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(51,65,85,0.5);
      gap: 14px;
      transition: background 0.15s;
    }
    .list-row:last-child { border-bottom: none; }
    .list-row.clickable { cursor: pointer; }
    .list-row.clickable:hover { background: rgba(255,255,255,0.025); }
    .list-row.clickable:active { background: rgba(255,255,255,0.04); }

    .row-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(51,65,85,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--accent);
    }

    .row-body {
      flex: 1;
      min-width: 0;
    }

    .row-label {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 2px;
    }

    .row-value {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-right {
      color: rgba(148,163,184,0.5);
      flex-shrink: 0;
    }

    .badge-soon {
      font-size: 0.65rem;
      font-weight: 600;
      background: rgba(0,200,150,0.12);
      color: var(--accent);
      border-radius: 6px;
      padding: 2px 7px;
      letter-spacing: 0.06em;
    }

    /* ── LOGOUT ── */
    .logout-btn {
      width: 100%;
      margin-top: 12px;
      padding: 16px;
      border-radius: 14px;
      border: 1.5px solid rgba(239,68,68,0.25);
      background: var(--danger-dim);
      color: var(--danger);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }
    .logout-btn:hover {
      background: rgba(239,68,68,0.2);
      border-color: rgba(239,68,68,0.45);
    }
    .logout-btn:active { transform: scale(0.98); }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: rgba(22,34,55,0.92);
      backdrop-filter: blur(16px);
      border-top: 1px solid rgba(51,65,85,0.5);
      display: flex;
      z-index: 30;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px 0 10px;
      gap: 4px;
      cursor: pointer;
      text-decoration: none;
      color: var(--muted);
      transition: color 0.2s;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.04em;
    }
    .nav-item.active { color: var(--accent); }
    .nav-item:hover:not(.active) { color: rgba(241,245,249,0.7); }

    .nav-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
      margin-top: -2px;
    }

    /* ── SKELETON ── */
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }

    .skeleton {
      background: linear-gradient(90deg, #1E293B 25%, #253348 50%, #1E293B 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 8px;
    }

    .sk-avatar {
      width: 76px; height: 76px;
      border-radius: 50%;
    }
    .sk-name { width: 140px; height: 20px; margin: 8px auto 0; }
    .sk-acct { width: 110px; height: 14px; margin: 6px auto 0; }
    .sk-row-val { width: 130px; height: 15px; }
    .sk-row-label { width: 60px; height: 10px; margin-bottom: 4px; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #22C55E;
      color: #fff;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 4px 24px rgba(34,197,94,0.35);
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* fade-in on load */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up {
      animation: fadeUp 0.4s ease both;
    }
    .fade-up-1 { animation-delay: 0.05s; }
    .fade-up-2 { animation-delay: 0.12s; }
    .fade-up-3 { animation-delay: 0.19s; }
    .fade-up-4 { animation-delay: 0.26s; }
  </style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header class="header">
    <h1>Me</h1>
  </header>

  <!-- SCROLL AREA -->
  <main class="scroll-area" id="main-content">

    <!-- SKELETON STATE -->
    <div id="skeleton">
      <div class="card profile-card" style="padding:32px 24px 28px;">
        <div class="skeleton sk-avatar"></div>
        <div class="skeleton sk-name"></div>
        <div class="skeleton sk-acct"></div>
      </div>

      <div class="card list-card">
        <div class="list-row" style="gap:14px;" aria-hidden="true">
          <div class="skeleton" style="width:36px;height:36px;border-radius:10px;flex-shrink:0;"></div>
          <div style="flex:1">
            <div class="skeleton sk-row-label"></div>
            <div class="skeleton sk-row-val"></div>
          </div>
        </div>
        <div class="list-row" style="gap:14px;" aria-hidden="true">
          <div class="skeleton" style="width:36px;height:36px;border-radius:10px;flex-shrink:0;"></div>
          <div style="flex:1">
            <div class="skeleton sk-row-label"></div>
            <div class="skeleton sk-row-val"></div>
          </div>
        </div>
        <div class="list-row" style="gap:14px;border-bottom:none;" aria-hidden="true">
          <div class="skeleton" style="width:36px;height:36px;border-radius:10px;flex-shrink:0;"></div>
          <div style="flex:1">
            <div class="skeleton sk-row-label"></div>
            <div class="skeleton sk-row-val" style="width:90px;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ACTUAL CONTENT (hidden until loaded) -->
    <div id="profile-content" style="display:none;">

      <!-- Profile Card -->
      <div class="card profile-card fade-up fade-up-1" id="profile-card">
        <div class="avatar" id="avatar-initials">JD</div>
        <p class="profile-name" id="profile-name">John Doe</p>
        <div class="account-row">
          <span class="account-number" id="account-number">2010000001</span>
          <button class="copy-btn" id="copy-btn" title="Copy account number" aria-label="Copy account number">
            <i data-lucide="copy" style="width:15px;height:15px;"></i>
          </button>
        </div>
      </div>

      <!-- Details List -->
      <div class="card list-card fade-up fade-up-2">
        <div class="list-row">
          <div class="row-icon">
            <i data-lucide="mail" style="width:17px;height:17px;"></i>
          </div>
          <div class="row-body">
            <p class="row-label">Email</p>
            <p class="row-value" id="detail-email">—</p>
          </div>
        </div>
        <div class="list-row">
          <div class="row-icon">
            <i data-lucide="phone" style="width:17px;height:17px;"></i>
          </div>
          <div class="row-body">
            <p class="row-label">Phone</p>
            <p class="row-value" id="detail-phone">—</p>
          </div>
        </div>
        <div class="list-row">
          <div class="row-icon">
            <i data-lucide="calendar-days" style="width:17px;height:17px;"></i>
          </div>
          <div class="row-body">
            <p class="row-label">Member Since</p>
            <p class="row-value" id="detail-since">—</p>
          </div>
        </div>
      </div>

      <!-- Actions List -->
      <div class="card list-card fade-up fade-up-3">
        <div class="list-row clickable" onclick="comingSoon('Settings')">
          <div class="row-icon">
            <i data-lucide="settings-2" style="width:17px;height:17px;"></i>
          </div>
          <div class="row-body">
            <p class="row-value">Settings</p>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="badge-soon">Soon</span>
            <i data-lucide="chevron-right" class="row-right" style="width:16px;height:16px;"></i>
          </div>
        </div>
        <div class="list-row clickable" onclick="comingSoon('Help & Support')">
          <div class="row-icon">
            <i data-lucide="life-buoy" style="width:17px;height:17px;"></i>
          </div>
          <div class="row-body">
            <p class="row-value">Help & Support</p>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="badge-soon">Soon</span>
            <i data-lucide="chevron-right" class="row-right" style="width:16px;height:16px;"></i>
          </div>
        </div>
        <div class="list-row clickable" onclick="comingSoon('Terms & Privacy')">
          <div class="row-icon">
            <i data-lucide="shield-check" style="width:17px;height:17px;"></i>
          </div>
          <div class="row-body">
            <p class="row-value">Terms & Privacy</p>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="badge-soon">Soon</span>
            <i data-lucide="chevron-right" class="row-right" style="width:16px;height:16px;"></i>
          </div>
        </div>
      </div>

      <!-- Logout -->
      <button class="logout-btn fade-up fade-up-4" id="logout-btn">
        <i data-lucide="log-out" style="width:18px;height:18px;"></i>
        Logout
      </button>

    </div><!-- /profile-content -->
  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item">
      <i data-lucide="layout-dashboard" style="width:20px;height:20px;"></i>
      Home
    </a>
    <a href="transactions.html" class="nav-item">
      <i data-lucide="arrow-left-right" style="width:20px;height:20px;"></i>
      Transactions
    </a>
    <a href="profile.html" class="nav-item active">
      <i data-lucide="user-circle-2" style="width:20px;height:20px;"></i>
      Me
      <div class="nav-dot"></div>
    </a>
  </nav>

</div><!-- /app -->

<!-- TOAST -->
<div id="toast"></div>

<script>
  const API_BASE = 'http://localhost:3060/api/v1';

  /* ── Helpers ── */
  function getToken() {
    return localStorage.getItem('token');
  }

  function showToast(msg, color = '#22C55E') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = color;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function getInitials(fullname) {
    if (!fullname) return '??';
    const parts = fullname.trim().split(/\s+/);
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }

  function formatDate(dateStr) {
    if (!dateStr) return '—';
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
  }

  function hideSkeleton() {
    document.getElementById('skeleton').style.display = 'none';
    document.getElementById('profile-content').style.display = 'block';
  }

  /* ── Fetch profile ── */
  async function fetchProfile() {
    const token = getToken();
    if (!token) {
      window.location.href = 'login.html';
      return;
    }

    try {
      const res = await axios.get(`${API_BASE}/user/profile`, {
        headers: { Authorization: `Bearer ${token}` }
      });

      const data = res.data;
      const { fullname, accountNumber, email, phone, createdAt } = data;

      document.getElementById('avatar-initials').textContent = getInitials(fullname);
      document.getElementById('profile-name').textContent = fullname || '—';
      document.getElementById('account-number').textContent = accountNumber || '—';
      document.getElementById('detail-email').textContent = email || '—';
      document.getElementById('detail-phone').textContent = phone || '—';
      document.getElementById('detail-since').textContent = formatDate(createdAt);

      // Store account number for copy
      document.getElementById('copy-btn').dataset.value = accountNumber || '';

    } catch (err) {
      const status = err?.response?.status;
      if (status === 401 || status === 403) {
        localStorage.removeItem('token');
        localStorage.removeItem('accountNumber');
        window.location.href = 'login.html';
        return;
      }
      showToast('Failed to load profile', '#EF4444');
    } finally {
      hideSkeleton();
      lucide.createIcons();
    }
  }

  /* ── Copy account number ── */
  document.getElementById('copy-btn').addEventListener('click', async function () {
    const val = this.dataset.value || document.getElementById('account-number').textContent;
    try {
      await navigator.clipboard.writeText(val);
      showToast('✓  Copied!');
    } catch {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = val;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('✓  Copied!');
    }
  });

  /* ── Logout ── */
  document.getElementById('logout-btn').addEventListener('click', function () {
    localStorage.removeItem('token');
    localStorage.removeItem('accountNumber');
    window.location.href = 'login.html';
  });

  /* ── Coming soon ── */
  function comingSoon(name) {
    showToast(`${name} – Coming Soon`, '#334155');
  }

  /* ── Init ── */
  lucide.createIcons();
  fetchProfile();
</script>
</body>
</html>
