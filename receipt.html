<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transaction Receipt — Entity Bank</title>
  <script src="lib/tailwind.js"></script>
  <script src="lib/axios.min.js"></script>
  <script src="lib/lucide.js"></script>
  <!-- <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" /> -->

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0F172A',
            card: '#1E293B',
            accent: '#00C896',
            textMain: '#F1F5F9',
            border: '#334155',
            success: '#22C55E',
            muted: '#94A3B8',
          },
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            body: ['DM Sans', 'sans-serif'],
            mono: ['DM Mono', 'monospace'],
          },
        },
      },
    };
  </script>

  <style>
    * { box-sizing: border-box; }
    body {
      background-color: #0F172A;
      color: #F1F5F9;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* Subtle background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 200, 150, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 200, 150, 0.03) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    .page-wrapper {
      position: relative;
      z-index: 1;
    }

    /* Animated checkmark */
    @keyframes popIn {
      0% { transform: scale(0) rotate(-15deg); opacity: 0; }
      70% { transform: scale(1.15) rotate(3deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-ring {
      0%   { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.55); opacity: 0; }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    .check-wrap {
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s both;
    }
    .pulse-ring {
      animation: pulse-ring 1.6s ease-out infinite;
    }
    .fade-up-1 { animation: fadeUp 0.45s ease 0.35s both; }
    .fade-up-2 { animation: fadeUp 0.45s ease 0.48s both; }
    .fade-up-3 { animation: fadeUp 0.45s ease 0.58s both; }
    .fade-up-4 { animation: fadeUp 0.45s ease 0.66s both; }
    .fade-up-5 { animation: fadeUp 0.45s ease 0.74s both; }
    .fade-up-6 { animation: fadeUp 0.45s ease 0.82s both; }
    .fade-up-7 { animation: fadeUp 0.45s ease 0.90s both; }

    .amount-shimmer {
      background: #F1F5F9;
      /* linear-gradient(90deg, #F1F5F9 35%, #00C896 50%, #F1F5F9 65%); */
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 2.8s linear 0.5s both;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 0;
      border-bottom: 1px solid #334155;
    }
    .detail-row:last-child { border-bottom: none; }

    .section-card {
      background: #0F172A;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 16px;
      margin-top: 16px;
    }
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #00C896;
      margin-bottom: 12px;
    }

    .btn-share {
      flex: 1;
      border: 1.5px solid #334155;
      background: transparent;
      color: #F1F5F9;
      border-radius: 12px;
      padding: 14px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-share:hover { border-color: #00C896; background: rgba(0,200,150,0.06); }
    .btn-share:active { transform: scale(0.97); }

    .btn-done {
      flex: 1;
      background: #00C896;
      color: #0F172A;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-done:hover { background: #00b086; }
    .btn-done:active { transform: scale(0.97); }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #1E293B;
      border: 1px solid #00C896;
      color: #00C896;
      padding: 10px 22px;
      border-radius: 40px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      z-index: 100;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, #1E293B 25%, #2a3a52 50%, #1E293B 75%);
      background-size: 200% 100%;
      animation: shimmer-load 1.4s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer-load {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    .icon-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #1E293B;
      border: 1px solid #334155;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    .icon-btn:hover { background: #263348; }
    .icon-btn:active { transform: scale(0.93); }

    .total-row {
      background: rgba(0,200,150,0.07);
      border-radius: 10px;
      padding: 11px 12px;
      margin-top: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>
<body>

<div class="page-wrapper flex justify-center min-h-screen">
  <div class="w-full max-w-[480px] px-4 pb-10 pt-0">

    <!-- Header -->
    <div class="flex items-center justify-between py-5 sticky top-0 z-10" style="background: #0F172A;">
      <button class="icon-btn" id="backBtn" aria-label="Go back">
        <i data-lucide="arrow-left" class="w-4 h-4 text-textMain"></i>
      </button>
      <span style="font-family:'Syne',sans-serif; font-weight:700; font-size:17px; letter-spacing:0.01em;">Receipt</span>
      <button class="icon-btn" id="headerShareBtn" aria-label="Share">
        <i data-lucide="share-2" class="w-4 h-4 text-textMain"></i>
      </button>
    </div>

    <!-- Loading state -->
    <div id="loadingState">
      <div class="rounded-2xl p-6 mb-0" style="background:#1E293B; border:1px solid #334155;">
        <div class="flex flex-col items-center gap-3">
          <div class="skeleton w-16 h-16 rounded-full"></div>
          <div class="skeleton w-44 h-4"></div>
          <div class="skeleton w-32 h-8"></div>
        </div>
      </div>
      <div class="section-card mt-4">
        <div class="skeleton w-28 h-3 mb-4"></div>
        <div class="space-y-3">
          <div class="flex justify-between"><div class="skeleton w-24 h-3"></div><div class="skeleton w-28 h-3"></div></div>
          <div class="flex justify-between"><div class="skeleton w-24 h-3"></div><div class="skeleton w-36 h-3"></div></div>
          <div class="flex justify-between"><div class="skeleton w-24 h-3"></div><div class="skeleton w-28 h-3"></div></div>
          <div class="flex justify-between"><div class="skeleton w-24 h-3"></div><div class="skeleton w-20 h-3"></div></div>
        </div>
      </div>
    </div>

    <!-- Error state -->
    <div id="errorState" class="hidden flex flex-col items-center justify-center py-20 gap-4 text-center">
      <div style="width:64px;height:64px;background:#1E293B;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid #334155;">
        <i data-lucide="alert-circle" class="w-7 h-7" style="color:#ef4444;"></i>
      </div>
      <p style="font-family:'Syne',sans-serif;font-weight:700;font-size:16px;">Failed to load receipt</p>
      <p id="errorMsg" style="color:#94A3B8;font-size:14px;"></p>
      <button onclick="loadTransaction()" style="background:#00C896;color:#0F172A;border:none;border-radius:10px;padding:10px 24px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;cursor:pointer;">
        Retry
      </button>
    </div>

    <!-- Receipt content -->
    <div id="receiptContent" class="hidden">

      <!-- Success Card -->
      <div class="fade-up-1 rounded-2xl p-6 text-center" style="background:#1E293B; border:1px solid #334155;">
        <!-- Pulse ring + checkmark -->
        <div class="relative flex items-center justify-center mx-auto mb-4" style="width:72px;height:72px;">
          <div class="pulse-ring absolute inset-0 rounded-full" style="background:rgba(34,197,94,0.25);"></div>
          <div class="check-wrap relative flex items-center justify-center rounded-full" style="width:64px;height:64px;background:rgba(34,197,94,0.15);border:2px solid #22C55E;">
            <i data-lucide="check" class="w-7 h-7" style="color:#22C55E;stroke-width:3;"></i>
          </div>
        </div>

        <p class="fade-up-1 text-sm mb-1" style="color:#94A3B8;font-family:'DM Sans',sans-serif;font-weight:500;">Transaction Successful</p>
        <p id="displayAmount" class="amount-shimmer fade-up-2" style="font-family:'Syne',sans-serif;font-size:32px;font-weight:800;letter-spacing:-0.02em;">₦0.00</p>

        <!-- Type badge -->
        <div class="fade-up-2 inline-flex items-center gap-1.5 mt-3 px-3 py-1 rounded-full" style="background:rgba(0,200,150,0.1);border:1px solid rgba(0,200,150,0.25);">
          <i data-lucide="repeat-2" class="w-3 h-3" style="color:#00C896;"></i>
          <span id="displayType" style="color:#00C896;font-size:12px;font-family:'Syne',sans-serif;font-weight:600;letter-spacing:0.06em;">TRANSFER</span>
        </div>
      </div>

      <!-- Transaction Details -->
      <div class="section-card fade-up-3">
        <p class="section-title">Transaction Details</p>
        <div class="detail-row">
          <span style="color:#94A3B8;font-size:13px;">Transaction Type</span>
          <span id="detType" style="font-size:13px;font-weight:600;"></span>
        </div>
        <div class="detail-row">
          <span style="color:#94A3B8;font-size:13px;">Reference ID</span>
          <span id="detRef" style="font-size:12px;font-family:'DM Mono',monospace;color:#00C896;word-break:break-all;text-align:right;max-width:55%;"></span>
        </div>
        <div class="detail-row">
          <span style="color:#94A3B8;font-size:13px;">Date &amp; Time</span>
          <span id="detDate" style="font-size:13px;font-weight:500;text-align:right;"></span>
        </div>
        <div class="detail-row">
          <span style="color:#94A3B8;font-size:13px;">Status</span>
          <span id="detStatus" class="flex items-center gap-1.5" style="font-size:13px;font-weight:600;"></span>
        </div>
        <div id="senderRow" class="detail-row hidden">
          <span style="color:#94A3B8;font-size:13px;">Sender</span>
          <span id="detSender" style="font-size:13px;font-weight:600;word-break:break-word;text-align:right;max-width:55%;"></span>
        </div>
        <div id="receiverRow" class="detail-row hidden">
          <span style="color:#94A3B8;font-size:13px;">Receiver</span>
          <span id="detReceiver" style="font-size:13px;font-weight:600;word-break:break-word;text-align:right;max-width:55%;"></span>
        </div>
        <div id="networkRow" class="detail-row hidden">
          <span style="color:#94A3B8;font-size:13px;">Network</span>
          <span id="detNetwork" style="font-size:13px;font-weight:600;"></span>
        </div>
        <div id="phoneRow" class="detail-row hidden">
          <span style="color:#94A3B8;font-size:13px;">Phone</span>
          <span id="detPhone" style="font-size:13px;font-weight:600;"></span>
        </div>
        <div id="planRow" class="detail-row hidden">
          <span style="color:#94A3B8;font-size:13px;">Plan</span>
          <span id="detPlan" style="font-size:13px;font-weight:600;"></span>
        </div>
      </div>

      <!-- Amount Breakdown -->
      <div id="breakdownSection" class="section-card fade-up-6 hidden">
        <p class="section-title">Amount Breakdown</p>
        <div class="detail-row">
          <span style="color:#94A3B8;font-size:13px;">Amount Sent</span>
          <span id="breakAmount" style="font-size:13px;font-weight:600;font-family:'DM Mono',monospace;"></span>
        </div>
        <div class="detail-row">
          <span style="color:#94A3B8;font-size:13px;">Transaction Fee</span>
          <span id="breakFee" style="font-size:13px;font-family:'DM Mono',monospace;color:#94A3B8;"></span>
        </div>
        <div class="total-row" style="margin-top:12px;">
          <span style="font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#00C896;">Total Debit</span>
          <span id="breakTotal" style="font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#00C896;"></span>
        </div>
      </div>

      <!-- CTA Buttons -->
      <div class="fade-up-7 flex gap-3 mt-6">
        <button class="btn-share" id="shareBtn">
          <i data-lucide="share-2" class="w-4 h-4"></i>
          Share Receipt
        </button>
        <button class="btn-done" id="doneBtn">
          Done
        </button>
      </div>

    </div><!-- /receiptContent -->
  </div>
</div>

<!-- Toast notification -->
<div id="toast">✓ Copied to clipboard</div>

<script>
  // ─── Helpers ────────────────────────────────────────────────────────────────
  const API_BASE = 'http://localhost:3060/api/v1';

  function fmt(n) {
    return '₦' + Number(n).toLocaleString('en-NG', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function fmtDate(iso) {
    const d = new Date(iso);
    const day  = d.getDate();
    const mon  = d.toLocaleString('en-GB', { month: 'short' });
    const yr   = d.getFullYear();
    let   hr   = d.getHours();
    const min  = String(d.getMinutes()).padStart(2, '0');
    const ampm = hr >= 12 ? 'PM' : 'AM';
    hr = hr % 12 || 12;
    return `${day} ${mon} ${yr}, ${hr}:${min} ${ampm}`;
  }

  function showToast(msg = '✓ Copied to clipboard') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  function getParam(key) {
    return new URLSearchParams(window.location.search).get(key);
  }

  function getToken() {
    return localStorage.getItem('token');
  }

  // ─── Render ─────────────────────────────────────────────────────────────────
  function render(tx) {
    // Success card
    document.getElementById('displayAmount').textContent = fmt(tx.amount);
    document.getElementById('displayType').textContent   = (tx.type || '').toUpperCase();

    // Details
    document.getElementById('detType').textContent = tx.type || '—';
    document.getElementById('detRef').textContent  = tx.id   || '—';
    document.getElementById('detDate').textContent = tx.createdAt ? fmtDate(tx.createdAt) : '—';

    const statusEl = document.getElementById('detStatus');
    const isSuccess = (tx.status || '').toLowerCase() === 'successful';
    const dotColor  = isSuccess ? '#22C55E' : '#f59e0b';
    const txtColor  = isSuccess ? '#22C55E' : '#f59e0b';
    statusEl.innerHTML = `
      <span style="width:8px;height:8px;border-radius:50%;background:${dotColor};display:inline-block;flex-shrink:0;"></span>
      <span style="color:${txtColor};">${tx.status || '—'}</span>`;

    const type = (tx.type || '').toLowerCase();
    const isDebit = type === 'debit';
    const isTopup = type === 'topup';

    const senderName    = tx.sender?.name || tx.senderName || '—';
    const senderAccount = tx.sender?.accountNumber || tx.senderAccount || '—';
    const receiverName    = tx.receiver?.name || tx.receiverName || '—';
    const receiverAccount = tx.receiver?.accountNumber || tx.receiverAccount || '—';
    const network = tx.network || '—';
    const phone   = tx.phone_number || tx.phoneNumber || tx.phone || '—';
    const plan    = tx.plan || '—';

    document.getElementById('detSender').textContent   = `${senderName} • ${senderAccount}`;
    document.getElementById('detReceiver').textContent = `${receiverName} • ${receiverAccount}`;
    document.getElementById('detNetwork').textContent  = network;
    document.getElementById('detPhone').textContent    = phone;
    document.getElementById('detPlan').textContent     = plan;

    document.getElementById('senderRow').classList.toggle('hidden', isTopup);
    document.getElementById('receiverRow').classList.toggle('hidden', isTopup);
    document.getElementById('networkRow').classList.toggle('hidden', !isTopup);
    document.getElementById('phoneRow').classList.toggle('hidden', !isTopup);
    document.getElementById('planRow').classList.toggle('hidden', !isTopup || !tx.plan);

    document.getElementById('breakdownSection').classList.toggle('hidden', !isDebit);
    document.getElementById('breakAmount').textContent = tx.amount    != null ? fmt(tx.amount)    : '—';
    document.getElementById('breakFee').textContent    = tx.fee       != null ? fmt(tx.fee)       : '—';
    document.getElementById('breakTotal').textContent  = tx.totalDebit!= null ? fmt(tx.totalDebit): '—';

    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('receiptContent').classList.remove('hidden');

    // Re-render Lucide icons inside newly-shown content
    lucide.createIcons();
  }

  // ─── Build receipt text for sharing ─────────────────────────────────────────
  function buildReceiptText(tx) {
    const senderName    = tx.sender?.name || tx.senderName || '—';
    const senderAccount = tx.sender?.accountNumber || tx.senderAccount || '—';
    const receiverName    = tx.receiver?.name || tx.receiverName || '—';
    const receiverAccount = tx.receiver?.accountNumber || tx.receiverAccount || '—';
    const network = tx.network || '—';
    const phone   = tx.phone || '—';
    const plan    = tx.plan || '—';

    const lines = [
      '── Entity Bank Receipt ──',
      `Status:     ${tx.status || '—'}`,
      `Type:       ${tx.type || '—'}`,
      `Amount:     ${fmt(tx.amount)}`,
    ];

    if (tx.type === 'Debit') {
      lines.push(`Fee:        ${fmt(tx.fee)}`);
      lines.push(`Total:      ${fmt(tx.totalDebit)}`);
    }

    if (tx.type === 'Topup') {
      lines.push('', `Network:    ${network}`, `Phone:      ${phone}`);
      if (tx.plan) lines.push(`Plan:       ${plan}`);
    } else {
      lines.push('', `From:       ${senderName} (${senderAccount})`, `To:         ${receiverName} (${receiverAccount})`);
    }

    lines.push('', `Ref:   ${tx.id || '—'}`, `Date:  ${fmtDate(tx.createdAt)}`, '─────────────────────────');
    return lines.join('\n');
  }

  // ─── Share / Copy ────────────────────────────────────────────────────────────
  let currentTx = null;

  function handleShare() {
    if (!currentTx) return;
    const text = buildReceiptText(currentTx);
    if (navigator.share) {
      navigator.share({ title: 'Entity Bank Receipt', text }).catch(() => {});
    } else {
      navigator.clipboard.writeText(text)
        .then(() => showToast('✓ Receipt copied!'))
        .catch(() => {
          // Fallback: textarea copy
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed';
          ta.style.opacity  = '0';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          showToast('✓ Receipt copied!');
        });
    }
  }

  // ─── Fetch transaction ───────────────────────────────────────────────────────
  async function loadTransaction() {
    const token = getToken();
    if (!token) {
      window.location.href = 'login.html';
      return;
    }

    const txId = getParam('id');
    if (!txId) {
      showError('No transaction ID provided in the URL.');
      return;
    }

    document.getElementById('loadingState').classList.remove('hidden');
    document.getElementById('receiptContent').classList.add('hidden');
    document.getElementById('errorState').classList.add('hidden');

    try {
      const { data } = await axios.get(`${API_BASE}/user/transaction/${txId}`, {
        headers: { Authorization: `Bearer ${token}` },
      });

      // const tx = data;
      currentTx = data;
      render(currentTx);
    } catch (err) {
      const msg = err.message
               || 'Something went wrong. Please try again.';
      showError(msg);

      if (err.status === 401) {
        localStorage.removeItem('token');
        localStorage.removeItem('accountNumber');
        setTimeout(() => { window.location.href = 'login.html'; }, 1200);
      }
    }
  }

  function showError(msg) {
    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('receiptContent').classList.add('hidden');
    document.getElementById('errorMsg').textContent = msg;
    document.getElementById('errorState').classList.remove('hidden');
    lucide.createIcons();
  }

  // ─── Navigation ──────────────────────────────────────────────────────────────
  function goBack() {
    window.location.href = 'transactions.html';
  }

  // ─── Event wiring ────────────────────────────────────────────────────────────
  document.getElementById('backBtn').addEventListener('click', goBack);
  document.getElementById('doneBtn').addEventListener('click', goBack);
  document.getElementById('shareBtn').addEventListener('click', handleShare);
  document.getElementById('headerShareBtn').addEventListener('click', handleShare);

  // ─── Init ────────────────────────────────────────────────────────────────────
  lucide.createIcons();
  loadTransaction();
</script>
</body>
</html>
