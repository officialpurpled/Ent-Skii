<!DOCTYPE html>
<html>
<head>
  <title>Sign Up</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="container">
  <h2>Create Account</h2>

  <!-- STEP 1 -->
  <div id="step1">
    <input id="fullname" placeholder="Full Name">
    <input id="email" placeholder="Email">
    <input id="phone" placeholder="Phone">
    <input id="address" placeholder="Address">
    <button onclick="nextStep(2)">Next</button>
  </div>

  <!-- STEP 2 -->
  <div id="step2" style="display:none;">
    <input id="bvn" placeholder="BVN">
    <input id="nin" placeholder="NIN">
    <input id="password" type="password" placeholder="Password">
    <button onclick="submitSignup()">Create Account</button>
  </div>

  <!-- STEP 3 -->
  <div id="step3" style="display:none;">
    <h3 id="signupMessage"></h3>
    <p id="accountNumber"></p>
    <button onclick="goLogin()">Proceed to Login</button>
  </div>

  <p onclick="goLogin()">Already have account? Login</p>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
function nextStep(step){
  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";
}

async function submitSignup(){
  const data = {
    fullname: fullname.value,
    email: email.value,
    phone: phone.value,
    address: address.value,
    bvn: bvn.value,
    nin: nin.value,
    password: password.value
  };

  const res = await apiRequest("/auth/create-account", "POST", data);

  if(res.success){
    step2.style.display = "none";
    step3.style.display = "block";

    signupMessage.innerText = res.message;
    accountNumber.innerText = "Account No: " + res.accountNumber;
  } else {
    alert(res.message);
  }
}

function goLogin(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
