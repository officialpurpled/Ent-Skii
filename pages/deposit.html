<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deposit</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
  <div class="card">
    <h3>Deposit</h3>
    <p>Bank: Entity Bank</p>
    <p id="accName"></p>
    <p id="accNo"></p>

    <button onclick="copyAcc()">Copy</button>
  </div>
</div>

<script src="js/api.js"></script>
<script>
async function loadDeposit(){
  const user = await apiRequest("/user/profile");

  accName.innerText = user.name;
  accNo.innerText = user.accountNumber;
}

function copyAcc(){
  navigator.clipboard.writeText(accNo.innerText);
  alert("Copied");
}

loadDeposit();
</script>
</body>
</html>
