<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transfer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">

  <!-- STEP 1 -->
  <div id="t1">
    <input id="receiverAcc" placeholder="Account Number">
    <button onclick="verify()">Verify</button>
    <p id="receiverName"></p>
    <button onclick="goStep(2)">Next</button>
  </div>

  <!-- STEP 2 -->
  <div id="t2" style="display:none;">
    <input id="amount" placeholder="Amount">
    <button onclick="goStep(3)">Next</button>
  </div>

  <!-- STEP 3 -->
  <div id="t3" style="display:none;">
    <p>Confirm Transfer</p>
    <p id="confirmDetails"></p>
    <button onclick="goStep(4)">Confirm</button>
  </div>

  <!-- STEP 4 -->
  <div id="t4" style="display:none;">
    <input id="tPassword" type="password" placeholder="Password">
    <button onclick="send()">Send</button>
  </div>

</div>

<script src="js/api.js"></script>
<script src="js/transfer.js"></script>
<script>
function goStep(step){
  document.querySelectorAll('[id^="t"]').forEach(d => d.style.display="none");
  document.getElementById("t"+step).style.display = "block";

  if(step === 3){
    confirmDetails.innerText = `${receiverName.innerText} - ₦${amount.value}`;
  }
}

async function verify(){
  await verifyAccount(receiverAcc.value);
}

async function send(){
  await sendMoney({
    accountNumber: receiverAcc.value,
    amount: amount.value,
    password: tPassword.value
  });
}
</script>
</body>
</html>
