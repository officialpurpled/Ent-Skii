<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Transactions – Entity Bank</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0F172A;
      --card: #1E293B;
      --accent: #00C896;
      --accent-dim: rgba(0,200,150,0.12);
      --text: #F1F5F9;
      --muted: #94A3B8;
      --border: #334155;
      --debit: #EF4444;
      --credit: #22C55E;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100dvh;
      overscroll-behavior-y: contain;
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
      background: var(--bg);
    }

    /* ── Pull-to-refresh indicator ── */
    #ptr-indicator {
      position: fixed;
      top: 0; left: 50%; transform: translateX(-50%);
      z-index: 999;
      display: flex; align-items: center; gap: 6px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, top 0.2s;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    #ptr-indicator.visible { opacity: 1; top: 12px; }

    /* ── Header ── */
    #header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(15,23,42,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .icon-btn {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .icon-btn:hover { background: #27384f; border-color: #4a5f7a; }
    .icon-btn:active { transform: scale(0.94); }

    #header h1 {
      flex: 1;
      text-align: center;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin: 0;
    }

    /* ── Search ── */
    #search-wrap {
      padding: 14px 20px 10px;
      position: sticky;
      top: 67px;
      z-index: 40;
      background: rgba(15,23,42,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    #search-wrap .search-inner {
      display: flex; align-items: center; gap: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }
    #search-wrap .search-inner:focus-within { border-color: var(--accent); }
    #search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
    }
    #search-input::placeholder { color: var(--muted); }

    /* ── Scrollable content ── */
    #scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0 100px;
      -webkit-overflow-scrolling: touch;
    }
    #scroll-area::-webkit-scrollbar { display: none; }

    /* ── Date group header ── */
    .date-group-header {
      padding: 18px 20px 8px;
      display: flex; align-items: center; gap: 10px;
    }
    .date-group-header span {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }
    .date-group-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Transaction row ── */
    .txn-row {
      display: flex; align-items: center; gap: 14px;
      padding: 13px 20px;
      cursor: pointer;
      transition: background 0.12s;
      position: relative;
    }
    .txn-row:active { background: rgba(255,255,255,0.03); }
    .txn-row::after {
      content: '';
      position: absolute;
      bottom: 0; left: 20px; right: 20px;
      height: 1px;
      background: var(--border);
      opacity: 0.5;
    }
    .txn-row:last-child::after { display: none; }

    .txn-icon {
      width: 44px; height: 44px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
    }
    .txn-icon.debit { background: rgba(239,68,68,0.12); }
    .txn-icon.credit { background: rgba(34,197,94,0.12); }

    .txn-info { flex: 1; min-width: 0; }
    .txn-title {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
      margin-bottom: 3px;
    }
    .txn-time {
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }
    .txn-narration {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
      opacity: 0.7;
    }

    .txn-amount {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      text-align: right;
      flex-shrink: 0;
    }
    .txn-amount.debit { color: var(--debit); }
    .txn-amount.credit { color: var(--credit); }

    /* ── Skeleton ── */
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, var(--card) 25%, #273549 50%, var(--card) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    .skeleton-row {
      display: flex; align-items: center; gap: 14px;
      padding: 13px 20px;
    }
    .skeleton-circle { width: 44px; height: 44px; border-radius: 14px; flex-shrink: 0; }
    .skeleton-lines { flex: 1; display: flex; flex-direction: column; gap: 7px; }
    .skeleton-line { height: 12px; }
    .skeleton-amount { width: 64px; height: 14px; border-radius: 6px; flex-shrink: 0; }

    /* ── Empty state ── */
    #empty-state {
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      padding: 60px 40px;
      text-align: center;
      gap: 16px;
    }
    #empty-state svg { opacity: 0.25; }
    #empty-state h3 { font-size: 16px; font-weight: 600; margin: 0; }
    #empty-state p { font-size: 13px; color: var(--muted); margin: 0; line-height: 1.6; }

    /* ── Error toast ── */
    #toast {
      position: fixed;
      bottom: 90px; left: 50%; transform: translateX(-50%);
      background: #3b1f1f;
      border: 1px solid var(--debit);
      color: var(--debit);
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      white-space: nowrap;
      max-width: calc(100vw - 40px);
      text-align: center;
    }
    #toast.show { opacity: 1; }

    /* ── Bottom nav ── */
    #bottom-nav {
      position: fixed;
      bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: rgba(30,41,59,0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 50;
    }
    .nav-item {
      flex: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 10px 0 14px;
      gap: 4px;
      cursor: pointer;
      transition: opacity 0.15s;
      text-decoration: none;
      color: var(--muted);
    }
    .nav-item:active { opacity: 0.6; }
    .nav-item span { font-size: 10px; font-weight: 500; }
    .nav-item.active { color: var(--accent); }
    .nav-item.active .nav-dot {
      display: block;
    }
    .nav-dot {
      display: none;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--accent);
      margin-top: 2px;
    }

    /* ── Filter sheet (placeholder) ── */
    #filter-badge {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      position: absolute;
      top: 5px; right: 5px;
      display: none;
    }
  </style>
</head>
<body>

<!-- Pull-to-refresh indicator -->
<div id="ptr-indicator">
  <i data-lucide="refresh-cw" style="width:13px;height:13px;"></i>
  <span>Release to refresh</span>
</div>

<div id="app">

  <!-- Header -->
  <header id="header">
    <button class="icon-btn" onclick="window.location.href='dashboard.html'" aria-label="Back">
      <i data-lucide="arrow-left" style="width:18px;height:18px;color:#94A3B8"></i>
    </button>
    <h1>Transactions</h1>
    <div class="icon-btn" style="position:relative;" onclick="showFilterToast()" aria-label="Filter">
      <i data-lucide="sliders-horizontal" style="width:18px;height:18px;color:#94A3B8"></i>
      <div id="filter-badge"></div>
    </div>
  </header>

  <!-- Search -->
  <div id="search-wrap">
    <div class="search-inner">
      <i data-lucide="search" style="width:16px;height:16px;color:#64748B;flex-shrink:0"></i>
      <input id="search-input" type="search" placeholder="Search transactions…" autocomplete="off" />
      <i data-lucide="x-circle" id="clear-search" style="width:16px;height:16px;color:#64748B;flex-shrink:0;cursor:pointer;display:none;"></i>
    </div>
  </div>

  <!-- Main scroll area -->
  <div id="scroll-area">
    <!-- Skeleton loader shown by default -->
    <div id="skeleton-loader">
      <div class="date-group-header" style="padding-top:20px;">
        <div class="skeleton skeleton-line" style="width:48px;height:11px;border-radius:4px;"></div>
        <div style="flex:1;height:1px;background:var(--border);margin-left:10px;"></div>
      </div>
      ${Array.from({length:5}).map(()=>`
      <div class="skeleton-row">
        <div class="skeleton skeleton-circle"></div>
        <div class="skeleton-lines">
          <div class="skeleton skeleton-line" style="width:65%;"></div>
          <div class="skeleton skeleton-line" style="width:40%;"></div>
        </div>
        <div class="skeleton skeleton-amount"></div>
      </div>`).join('')}
      <div class="date-group-header" style="padding-top:20px;">
        <div class="skeleton skeleton-line" style="width:64px;height:11px;border-radius:4px;"></div>
        <div style="flex:1;height:1px;background:var(--border);margin-left:10px;"></div>
      </div>
      ${Array.from({length:3}).map(()=>`
      <div class="skeleton-row">
        <div class="skeleton skeleton-circle"></div>
        <div class="skeleton-lines">
          <div class="skeleton skeleton-line" style="width:55%;"></div>
          <div class="skeleton skeleton-line" style="width:35%;"></div>
        </div>
        <div class="skeleton skeleton-amount"></div>
      </div>`).join('')}
    </div>

    <!-- Transaction list -->
    <div id="txn-list"></div>

    <!-- Empty state -->
    <div id="empty-state">
      <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="16" width="56" height="44" rx="8" fill="#334155"/>
        <rect x="16" y="28" width="24" height="4" rx="2" fill="#64748B"/>
        <rect x="16" y="38" width="16" height="4" rx="2" fill="#64748B"/>
        <rect x="44" y="36" width="12" height="4" rx="2" fill="#475569"/>
        <circle cx="54" cy="18" r="10" fill="#1E293B" stroke="#334155" stroke-width="2"/>
        <path d="M54 14v4l2 2" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <h3 id="empty-title">No transactions yet</h3>
      <p id="empty-sub">Your transaction history will appear here once you start sending or receiving money.</p>
    </div>
  </div>

  <!-- Bottom nav -->
  <nav id="bottom-nav">
    <a href="dashboard.html" class="nav-item">
      <i data-lucide="home" style="width:22px;height:22px;"></i>
      <span>Home</span>
    </a>
    <a href="transactions.html" class="nav-item active">
      <i data-lucide="arrow-left-right" style="width:22px;height:22px;"></i>
      <span>Transactions</span>
      <div class="nav-dot"></div>
    </a>
    <a href="cards.html" class="nav-item">
      <i data-lucide="credit-card" style="width:22px;height:22px;"></i>
      <span>Cards</span>
    </a>
    <a href="profile.html" class="nav-item">
      <i data-lucide="user" style="width:22px;height:22px;"></i>
      <span>Profile</span>
    </a>
  </nav>

</div>

<!-- Error toast -->
<div id="toast"></div>

<script>
  // ── Init Lucide icons ──
  lucide.createIcons();

  // ── Constants ──
  const API = 'http://localhost:3060/api/v1';
  let myAccountNumber = null;
  let allTransactions = [];
  let filteredTransactions = [];

  // ── Auth ──
  const token = localStorage.getItem('token') || sessionStorage.getItem('token');
  if (!token) {
    window.location.href = 'index.html';
  }

  const axiosInst = axios.create({
    baseURL: API,
    headers: { Authorization: `Bearer ${token}` }
  });

  // ── Helpers ──
  function formatAmount(amount) {
    return '₦' + Math.abs(amount).toLocaleString('en-NG', {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
  }

  function formatTime(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  }

  function formatFullDate(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function getDateKey(dateStr) {
    const d = new Date(dateStr);
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
    const txDate = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    if (txDate.getTime() === today.getTime()) return 'Today';
    if (txDate.getTime() === yesterday.getTime()) return 'Yesterday';
    return formatFullDate(dateStr);
  }

  function groupByDate(txns) {
    const groups = {};
    const order = [];
    txns.forEach(t => {
      const key = getDateKey(t.createdAt);
      if (!groups[key]) { groups[key] = []; order.push(key); }
      groups[key].push(t);
    });
    return { groups, order };
  }

  function showToast(msg, duration = 3500) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), duration);
  }

  function showFilterToast() {
    showToast('Filters coming soon!');
  }

  // ── Skeleton ──
  function hideSkeleton() {
    document.getElementById('skeleton-loader').style.display = 'none';
  }

  // ── Render ──
  function renderTransactions(txns) {
    const list = document.getElementById('txn-list');
    const empty = document.getElementById('empty-state');

    if (!txns || txns.length === 0) {
      list.innerHTML = '';
      empty.style.display = 'flex';
      if (document.getElementById('search-input').value.trim()) {
        document.getElementById('empty-title').textContent = 'No results found';
        document.getElementById('empty-sub').textContent = 'Try searching by name or narration.';
      } else {
        document.getElementById('empty-title').textContent = 'No transactions yet';
        document.getElementById('empty-sub').textContent = 'Your transaction history will appear here once you start sending or receiving money.';
      }
      return;
    }

    empty.style.display = 'none';
    const { groups, order } = groupByDate(txns);
    let html = '';

    order.forEach(dateKey => {
      html += `<div class="date-group-header"><span>${dateKey}</span></div>`;
      groups[dateKey].forEach(txn => {
        const isDebit = txn.senderAccount === myAccountNumber;
        const type = isDebit ? 'debit' : 'credit';
        const title = isDebit
          ? `Transfer to ${txn.receiverName || 'Unknown'}`
          : `Received from ${txn.senderName || 'Unknown'}`;
        const sign = isDebit ? '-' : '+';
        const amountStr = sign + formatAmount(txn.amount);
        const timeStr = formatTime(txn.createdAt);
        const icon = isDebit ? '↑' : '↓';
        const narration = txn.narration ? txn.narration.trim() : '';

        html += `
          <div class="txn-row" onclick='handleTxnClick(${JSON.stringify(txn).replace(/'/g, "&#39;")})' role="button" tabindex="0">
            <div class="txn-icon ${type}" aria-hidden="true">
              <i data-lucide="${isDebit ? 'arrow-up-right' : 'arrow-down-left'}" style="width:20px;height:20px;color:var(--${type})"></i>
            </div>
            <div class="txn-info">
              <div class="txn-title" title="${title}">${escapeHtml(title)}</div>
              <div class="txn-time">${timeStr}</div>
              ${narration ? `<div class="txn-narration">${escapeHtml(narration)}</div>` : ''}
            </div>
            <div class="txn-amount ${type}">${amountStr}</div>
          </div>`;
      });
    });

    list.innerHTML = html;
    lucide.createIcons();
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(str));
    return d.innerHTML;
  }

  function handleTxnClick(txn) {
    console.log('Transaction:', txn);
    // TODO: navigate to receipt page
    // window.location.href = `receipt.html?id=${txn.id}`;
  }

  // ── Search ──
  const searchInput = document.getElementById('search-input');
  const clearBtn = document.getElementById('clear-search');

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    clearBtn.style.display = q ? 'block' : 'none';
    if (!q) {
      filteredTransactions = [...allTransactions];
    } else {
      filteredTransactions = allTransactions.filter(t =>
        (t.senderName || '').toLowerCase().includes(q) ||
        (t.receiverName || '').toLowerCase().includes(q) ||
        (t.narration || '').toLowerCase().includes(q)
      );
    }
    renderTransactions(filteredTransactions);
  });

  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    clearBtn.style.display = 'none';
    filteredTransactions = [...allTransactions];
    renderTransactions(filteredTransactions);
    searchInput.focus();
  });

  // ── Fetch profile ──
  async function fetchProfile() {
    try {
      const res = await axiosInst.get('/user/profile');
      const data = res.data;
      myAccountNumber = data.accountNumber || data.data?.accountNumber || data.user?.accountNumber || null;
    } catch (err) {
      console.warn('Profile fetch error:', err);
    }
  }

  // ── Fetch transactions ──
  async function fetchTransactions() {
    try {
      const res = await axiosInst.get('/user/transactions');
      const data = res.data;
      // Support various response shapes
      allTransactions = Array.isArray(data) ? data :
        Array.isArray(data.data) ? data.data :
        Array.isArray(data.transactions) ? data.transactions : [];

      // Sort newest first
      allTransactions.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      filteredTransactions = [...allTransactions];
    } catch (err) {
      console.error('Transactions fetch error:', err);
      if (err.response?.status === 401) {
        localStorage.removeItem('token');
        sessionStorage.removeItem('token');
        window.location.href = 'index.html';
        return;
      }
      showToast('Failed to load transactions. Pull down to retry.');
      allTransactions = [];
      filteredTransactions = [];
    }
  }

  // ── Init ──
  async function init() {
    await fetchProfile();
    await fetchTransactions();
    hideSkeleton();
    renderTransactions(filteredTransactions);
  }

  init();

  // ── Pull to refresh ──
  let ptrStartY = 0;
  let ptrActive = false;
  let ptrTriggered = false;
  const PTR_THRESHOLD = 70;
  const scrollArea = document.getElementById('scroll-area');
  const ptrEl = document.getElementById('ptr-indicator');

  scrollArea.addEventListener('touchstart', e => {
    if (scrollArea.scrollTop === 0) {
      ptrStartY = e.touches[0].clientY;
      ptrActive = true;
      ptrTriggered = false;
    }
  }, { passive: true });

  scrollArea.addEventListener('touchmove', e => {
    if (!ptrActive) return;
    const dy = e.touches[0].clientY - ptrStartY;
    if (dy > 20) {
      ptrEl.classList.add('visible');
      if (dy > PTR_THRESHOLD && !ptrTriggered) {
        ptrTriggered = true;
        ptrEl.querySelector('span').textContent = 'Release to refresh';
      }
    }
  }, { passive: true });

  scrollArea.addEventListener('touchend', async () => {
    if (!ptrActive) return;
    ptrActive = false;
    if (ptrTriggered) {
      ptrEl.querySelector('span').textContent = 'Refreshing…';
      await fetchProfile();
      await fetchTransactions();
      const q = searchInput.value.trim().toLowerCase();
      if (q) {
        filteredTransactions = allTransactions.filter(t =>
          (t.senderName || '').toLowerCase().includes(q) ||
          (t.receiverName || '').toLowerCase().includes(q) ||
          (t.narration || '').toLowerCase().includes(q)
        );
      } else {
        filteredTransactions = [...allTransactions];
      }
      renderTransactions(filteredTransactions);
    }
    ptrEl.classList.remove('visible');
    ptrTriggered = false;
  }, { passive: true });
</script>
</body>
</html>
